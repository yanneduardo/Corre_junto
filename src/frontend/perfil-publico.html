<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Público - CorreJunto</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .perfil-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .perfil-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .perfil-foto {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .perfil-foto img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .perfil-nome {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .perfil-nivel {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .perfil-bio {
            text-align: center;
            margin: 20px 0;
            color: #666;
        }
        .perfil-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }
        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-numero {
            font-size: 24px;
            font-weight: bold;
            color: #2196F3;
        }
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .perfil-whatsapp {
            text-align: center;
            margin-top: 30px;
        }
        .btn-whatsapp {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-whatsapp:hover {
            background: #20BA5C;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="perfil-container">
        <div id="conteudo"></div>
    </div>

    <script>
        async function carregarPerfil() {
            const urlParams = new URLSearchParams(window.location.search);
            const usuarioId = urlParams.get('id');

            if (!usuarioId) {
                document.getElementById('conteudo').innerHTML = '<div class="error">ID do usuário não fornecido</div>';
                return;
            }

            document.getElementById('conteudo').innerHTML = '<div class="loading">Carregando perfil...</div>';

            try {
                const response = await fetch(`http://localhost:3000/usuarios/${usuarioId}/public-profile`);
                
                if (!response.ok) {
                    throw new Error('Usuário não encontrado');
                }

                const usuario = await response.json();
                exibirPerfil(usuario);
            } catch (erro) {
                document.getElementById('conteudo').innerHTML = `<div class="error">Erro ao carregar perfil: ${erro.message}</div>`;
            }
        }

        function exibirPerfil(usuario) {
            const foto = usuario.profile_picture_url 
                ? `<img src="${usuario.profile_picture_url}" alt="Foto de ${usuario.nome}">` 
                : '<span>📷</span>';

            const whatsapp = usuario.whatsapp 
                ? `<div class="perfil-whatsapp"><a href="https://wa.me/55${usuario.whatsapp}" class="btn-whatsapp">💬 Enviar mensagem</a></div>`
                : '';

            const html = `
                <div class="perfil-header">
                    <div class="perfil-foto">${foto}</div>
                    <div class="perfil-nome">${usuario.nome}</div>
                    <span class="perfil-nivel">${usuario.running_level}</span>
                    ${usuario.bio ? `<div class="perfil-bio">"${usuario.bio}"</div>` : ''}
                </div>

                <div class="perfil-stats">
                    <div class="stat-box">
                        <div class="stat-numero">${usuario.treinos_criados}</div>
                        <div class="stat-label">Treinos Criados</div>
                    </div>
                </div>

                ${whatsapp}
            `;

            document.getElementById('conteudo').innerHTML = html;
        }

        carregarPerfil();
    </script>
</body>
</html>
