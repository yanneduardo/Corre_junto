<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorreJunto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #2ecc71;
      --verde-escuro: #27ae60;
      --cinza: #f4f4f4;
      --borda: #ddd;
      --texto: #333;
      --vermelho: #e74c3c;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--cinza);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--verde);
      color: #fff;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; letter-spacing: 1px; }
    #btn-logout {
      background: rgba(0,0,0,0.15);
      border: none;
      color: #fff;
      padding: .4rem .9rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: .85rem;
    }
    #btn-logout:hover { background: rgba(0,0,0,0.3); }

    /* ── LAYOUT ── */
    main { max-width: 640px; margin: 2rem auto; padding: 0 1rem; }

    /* ── CARD ── */
    .card {
      background: #fff;
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 { margin-bottom: 1rem; font-size: 1.1rem; }

    /* ── FORMULÁRIO ── */
    .field { display: flex; flex-direction: column; margin-bottom: .9rem; }
    .field label { font-size: .82rem; font-weight: 600; margin-bottom: .3rem; color: #555; }
    .field input, .field select, .field textarea {
      border: 1px solid var(--borda);
      border-radius: 4px;
      padding: .55rem .75rem;
      font-size: .95rem;
      width: 100%;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--verde);
    }
    .field textarea { resize: vertical; min-height: 70px; }

    /* ── BOTÕES ── */
    .btn {
      display: inline-block;
      padding: .6rem 1.2rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
    }
    .btn-primary { background: var(--verde); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--verde-escuro); }
    .btn-danger { background: var(--vermelho); color: #fff; font-size: .82rem; padding: .35rem .75rem; }
    .btn-danger:hover { opacity: .85; }
    .btn-link {
      background: none;
      border: none;
      color: var(--verde-escuro);
      cursor: pointer;
      font-size: .9rem;
      text-decoration: underline;
      margin-top: .6rem;
      display: block;
      text-align: center;
    }

    /* ── MENSAGEM ── */
    .msg {
      padding: .6rem .9rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: .9rem;
    }
    .msg-erro { background: #fdecea; color: var(--vermelho); border: 1px solid #f5c6cb; }
    .msg-ok   { background: #eafaf1; color: var(--verde-escuro); border: 1px solid #a9dfbf; }
    .hidden { display: none !important; }

    /* ── TREINO ITEM ── */
    .treino-item {
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: .8rem;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .treino-item .info { flex: 1; }
    .treino-item .titulo {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: .25rem;
    }
    .treino-item .meta {
      font-size: .82rem;
      color: #666;
      line-height: 1.7;
    }
    .badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 600;
      background: #e8f8f0;
      color: var(--verde-escuro);
      margin-bottom: .4rem;
    }
    .empty { text-align: center; color: #999; padding: 2rem 0; font-size: .95rem; }

    /* ── TABS AUTH ── */
    .tabs { display: flex; margin-bottom: 1.2rem; border-bottom: 2px solid var(--borda); }
    .tab {
      flex: 1;
      text-align: center;
      padding: .6rem;
      cursor: pointer;
      font-weight: 600;
      font-size: .92rem;
      color: #888;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab.active { color: var(--verde-escuro); border-bottom-color: var(--verde); }

    /* ── SEPARADOR ── */
    .row { display: flex; gap: .8rem; }
    .row .field { flex: 1; }

    /* ── DETALHE ── */
    #view-detalhe .detalhe-label { font-size: .8rem; color: #888; text-transform: uppercase; font-weight: 600; margin-top: .9rem; }
    #view-detalhe .detalhe-valor { font-size: .97rem; margin-top: .15rem; }
    #btn-voltar { background: none; border: none; color: var(--verde-escuro); cursor: pointer; font-size: .9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: .3rem; }
    #btn-voltar:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>🏃 CorreJunto</h1>
  <button id="btn-logout" class="hidden">Sair</button>
</header>

<main>

  <!-- ── VIEW: AUTH ── -->
  <div id="view-auth">
    <div class="card">
      <div class="tabs">
        <div class="tab active" data-tab="login">Entrar</div>
        <div class="tab" data-tab="cadastro">Cadastrar</div>
      </div>

      <div id="msg-auth"></div>

      <!-- Login -->
      <form id="form-login">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="Mínimo 6 caracteres" required />
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <!-- Cadastro -->
      <form id="form-cadastro" class="hidden">
        <div class="field">
          <label>Nome</label>
          <input type="text" id="cad-nome" placeholder="Seu nome completo" required />
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="cad-email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" required />
        </div>
        <button type="submit" class="btn btn-primary">Criar conta</button>
      </form>
    </div>
  </div>

  <!-- ── VIEW: TREINOS ── -->
  <div id="view-treinos" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <span id="saudacao" style="font-size:.95rem; color:#555;"></span>
      <button class="btn btn-primary" style="width:auto;" onclick="mostrarCriar()">+ Novo treino</button>
    </div>

    <div id="msg-treinos"></div>
    <div id="lista-treinos"></div>
  </div>

  <!-- ── VIEW: CRIAR TREINO ── -->
  <div id="view-criar" class="hidden">
    <button id="btn-voltar-lista" onclick="mostrarTreinos()" style="background:none;border:none;color:var(--verde-escuro);cursor:pointer;font-size:.9rem;margin-bottom:1rem;">← Voltar</button>
    <div class="card">
      <h2>Novo treino</h2>
      <div id="msg-criar"></div>
      <form id="form-criar">
        <div class="field">
          <label>Tipo de treino</label>
          <select id="criar-tipo" required>
            <option value="">Selecione...</option>
            <option value="corrida_leve">Corrida leve</option>
            <option value="intervalado">Intervalado</option>
            <option value="longao">Longão</option>
          </select>
        </div>
        <div class="row">
          <div class="field">
            <label>Data</label>
            <input type="date" id="criar-data" required />
          </div>
          <div class="field">
            <label>Horário</label>
            <input type="time" id="criar-horario" required />
          </div>
        </div>
        <div class="field">
          <label>Local do encontro</label>
          <input type="text" id="criar-local" placeholder="Ex: Parque Municipal - Portão 2" required />
        </div>
        <div class="field">
          <label>Pace esperado <span style="font-weight:400;color:#aaa;">(opcional)</span></label>
          <input type="text" id="criar-pace" placeholder="Ex: 5:30/km" />
        </div>
        <div class="field">
          <label>Descrição <span style="font-weight:400;color:#aaa;">(opcional)</span></label>
          <textarea id="criar-descricao" placeholder="Detalhes do treino..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Criar treino</button>
      </form>
    </div>
  </div>

  <!-- ── VIEW: DETALHE ── -->
  <div id="view-detalhe" class="hidden">
    <button id="btn-voltar" onclick="mostrarTreinos()">← Voltar à lista</button>
    <div class="card" id="detalhe-conteudo"></div>
  </div>

</main>

<script>
  const API = '';  // mesmo origin
  let token = localStorage.getItem('cj_token');
  let usuarioAtual = JSON.parse(localStorage.getItem('cj_usuario') || 'null');

  // ── UTILITÁRIOS ──────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function mostrarMsg(elId, texto, tipo = 'erro') {
    const el = $(elId);
    el.innerHTML = `<div class="msg msg-${tipo}">${texto}</div>`;
  }

  function limparMsg(elId) { $(elId).innerHTML = ''; }

  function mostrarView(id) {
    ['view-auth', 'view-treinos', 'view-criar', 'view-detalhe']
      .forEach(v => $(v).classList.add('hidden'));
    $(id).classList.remove('hidden');
  }

  async function apiFetch(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(API + path, { ...opts, headers });
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  }

  function tipoLabel(tipo) {
    return { corrida_leve: 'Corrida leve', intervalado: 'Intervalado', longao: 'Longão' }[tipo] || tipo;
  }

  function formatarData(iso) {
    const [ano, mes, dia] = iso.split('-');
    return `${dia}/${mes}/${ano}`;
  }

  // ── AUTH ─────────────────────────────────────────────────────
  function inicializar() {
    if (token && usuarioAtual) {
      $('btn-logout').classList.remove('hidden');
      mostrarTreinos();
    } else {
      mostrarView('view-auth');
    }
  }

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const which = tab.dataset.tab;
      $('form-login').classList.toggle('hidden', which !== 'login');
      $('form-cadastro').classList.toggle('hidden', which !== 'cadastro');
      limparMsg('msg-auth');
    });
  });

  $('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    limparMsg('msg-auth');
    const { ok, data } = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: $('login-email').value, senha: $('login-senha').value })
    });
    if (!ok) return mostrarMsg('msg-auth', data.erro);
    salvarSessao(data.token, data.usuario);
    mostrarTreinos();
  });

  $('form-cadastro').addEventListener('submit', async e => {
    e.preventDefault();
    limparMsg('msg-auth');
    const { ok, data } = await apiFetch('/auth/cadastro', {
      method: 'POST',
      body: JSON.stringify({ nome: $('cad-nome').value, email: $('cad-email').value, senha: $('cad-senha').value })
    });
    if (!ok) return mostrarMsg('msg-auth', data.erro);
    salvarSessao(data.token, data.usuario);
    mostrarTreinos();
  });

  function salvarSessao(t, u) {
    token = t;
    usuarioAtual = u;
    localStorage.setItem('cj_token', t);
    localStorage.setItem('cj_usuario', JSON.stringify(u));
    $('btn-logout').classList.remove('hidden');
  }

  $('btn-logout').addEventListener('click', () => {
    token = null; usuarioAtual = null;
    localStorage.removeItem('cj_token');
    localStorage.removeItem('cj_usuario');
    $('btn-logout').classList.add('hidden');
    mostrarView('view-auth');
  });

  // ── TREINOS ──────────────────────────────────────────────────
  async function mostrarTreinos() {
    mostrarView('view-treinos');
    limparMsg('msg-treinos');
    $('saudacao').textContent = `Olá, ${usuarioAtual?.nome?.split(' ')[0]} 👋`;
    $('lista-treinos').innerHTML = '<p class="empty">Carregando...</p>';

    const { ok, data } = await apiFetch('/treinos');
    if (!ok) {
      if (data.erro?.includes('Token')) { $('btn-logout').click(); return; }
      return mostrarMsg('msg-treinos', data.erro);
    }

    if (data.total === 0) {
      $('lista-treinos').innerHTML = '<p class="empty">Nenhum treino disponível ainda.<br>Seja o primeiro a criar um! 🏃</p>';
      return;
    }

    $('lista-treinos').innerHTML = data.treinos.map(t => `
      <div class="treino-item">
        <div class="info">
          <div class="badge">${tipoLabel(t.tipo)}</div>
          <div class="titulo">${formatarData(t.data)} às ${t.horario}</div>
          <div class="meta">
            📍 ${t.local}<br>
            👤 ${t.criador?.nome || 'Desconhecido'}
            ${t.paceEsperado ? ` &nbsp;⏱ ${t.paceEsperado}` : ''}
            &nbsp;👥 ${t.totalParticipantes} participante(s)
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:.5rem;align-items:flex-end;">
          <button class="btn" style="background:#eee;font-size:.82rem;padding:.35rem .75rem;" onclick="verDetalhe('${t.id}')">Ver</button>
          ${t.criadorId === usuarioAtual?.id
            ? `<button class="btn btn-danger" onclick="cancelarTreino('${t.id}')">Cancelar</button>`
            : ''}
        </div>
      </div>
    `).join('');
  }

  function mostrarCriar() {
    limparMsg('msg-criar');
    $('form-criar').reset();
    mostrarView('view-criar');
  }

  $('form-criar').addEventListener('submit', async e => {
    e.preventDefault();
    limparMsg('msg-criar');

    const horarioRaw = $('criar-horario').value; // "HH:MM" ou "HH:MM:SS"
    const horario = horarioRaw.slice(0, 5);       // garante "HH:MM"

    const body = {
      data:        $('criar-data').value,
      horario,
      local:       $('criar-local').value,
      tipo:        $('criar-tipo').value,
      paceEsperado: $('criar-pace').value || undefined,
      descricao:   $('criar-descricao').value || undefined,
    };

    const { ok, data } = await apiFetch('/treinos', { method: 'POST', body: JSON.stringify(body) });
    if (!ok) return mostrarMsg('msg-criar', data.erro);

    mostrarTreinos();
  });

  async function cancelarTreino(id) {
    if (!confirm('Cancelar este treino?')) return;
    const { ok, data } = await apiFetch(`/treinos/${id}`, { method: 'DELETE' });
    if (!ok) return alert(data.erro);
    mostrarTreinos();
  }

  // ── DETALHE ──────────────────────────────────────────────────
  async function verDetalhe(id) {
    mostrarView('view-detalhe');
    $('detalhe-conteudo').innerHTML = '<p class="empty">Carregando...</p>';

    const { ok, data } = await apiFetch(`/treinos/${id}`);
    if (!ok) return $('detalhe-conteudo').innerHTML = `<p class="empty">${data.erro}</p>`;

    const ehCriador = data.criadorId === usuarioAtual?.id;

    $('detalhe-conteudo').innerHTML = `
      <div class="badge" style="margin-bottom:.5rem;">${tipoLabel(data.tipo)}</div>
      <h2 style="margin-bottom:1rem;">${formatarData(data.data)} às ${data.horario}</h2>

      <div class="detalhe-label">Local</div>
      <div class="detalhe-valor">📍 ${data.local}</div>

      <div class="detalhe-label">Criador</div>
      <div class="detalhe-valor">👤 ${data.criador?.nome || '—'}</div>

      <div class="detalhe-label">Participantes</div>
      <div class="detalhe-valor">👥 ${data.totalParticipantes}</div>

      ${data.paceEsperado ? `
        <div class="detalhe-label">Pace esperado</div>
        <div class="detalhe-valor">⏱ ${data.paceEsperado}</div>` : ''}

      ${data.descricao ? `
        <div class="detalhe-label">Descrição</div>
        <div class="detalhe-valor">${data.descricao}</div>` : ''}

      <div class="detalhe-label">Criado em</div>
      <div class="detalhe-valor" style="color:#999;font-size:.85rem;">${new Date(data.criadoEm).toLocaleString('pt-BR')}</div>

      ${ehCriador ? `
        <div style="margin-top:1.5rem;">
          <button class="btn btn-danger" onclick="cancelarTreino('${data.id}')">Cancelar este treino</button>
        </div>` : ''}
    `;
  }

  // ── INIT ─────────────────────────────────────────────────────
  inicializar();
</script>

</body>
</html>
