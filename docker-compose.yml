services:
  mysql:
    image: mysql:8.0
    container_name: corre_junto_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: corre_junto
      MYSQL_USER: usuario
      MYSQL_PASSWORD: senha123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/data/mysql-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:18-alpine
    container_name: corre_junto_backend
    working_dir: /app/src
    command: sh -c "npm install && npm run dev"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: usuario
      DB_PASSWORD: senha123
      DB_NAME: corre_junto
      JWT_SECRET: mude_este_segredo_em_producao
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development

    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
